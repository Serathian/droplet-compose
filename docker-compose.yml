services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
      - "--api.dashboard=true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`dns.jake-reddy.com`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=le"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/acme.json:/acme.json"
    networks:
      - traefik-public

  jake-reddy:
    image: ghcr.io/${GITHUB_OWNER}/jake-reddy.com-backend:latest
    container_name: jake-reddy
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jake-reddy.rule=Host(`jake-reddy.com`)"
      - "traefik.http.routers.jake-reddy.entrypoints=websecure"
      - "traefik.http.routers.jake-reddy.tls.certresolver=le"
      - "traefik.http.services.jake-reddy.loadbalancer.server.port=3002"
    networks:
      - traefik-public

  lastlightexplorer:
    image: ghcr.io/${GITHUB_OWNER}/lastlightexplorer:latest
    container_name: lastlightexplorer
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lastlightexplorer.rule=Host(`explorer.jake-reddy.com`)"
      - "traefik.http.routers.lastlightexplorer.entrypoints=websecure"
      - "traefik.http.routers.lastlightexplorer.tls.certresolver=le"
      - "traefik.http.services.lastlightexplorer.loadbalancer.server.port=80"
    networks:
      - traefik-public

  cms:
    image: ghcr.io/${GITHUB_OWNER}/basecamp:latest
    container_name: cms
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URI: postgresql://${CMS_DB_USER}:${CMS_DB_PASSWORD}@cms-db:5432/${CMS_DB_NAME}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: https://cms.jake-reddy.com
    volumes:
      - cms-uploads:/app/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cms.rule=Host(`cms.jake-reddy.com`)"
      - "traefik.http.routers.cms.entrypoints=websecure"
      - "traefik.http.routers.cms.tls.certresolver=le"
      - "traefik.http.services.cms.loadbalancer.server.port=3000"
    networks:
      - traefik-public
      - cms-internal
    depends_on:
      - cms-db

  cms-db:
    image: postgis/postgis:16-3.4
    container_name: cms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CMS_DB_NAME}
      POSTGRES_USER: ${CMS_DB_USER}
      POSTGRES_PASSWORD: ${CMS_DB_PASSWORD}
    volumes:
      - cms-db-data:/var/lib/postgresql/data
    networks:
      - cms-internal

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      - DOCKER_CONFIG=/config.json
      - WATCHTOWER_POLL_INTERVAL=300   # check for new images every 5 minutes
      - WATCHTOWER_CLEANUP=true        # remove old images after update

networks:
  traefik-public:
    external: false
  cms-internal:
    external: false
    internal: true

volumes:
  cms-db-data:
  cms-uploads:
